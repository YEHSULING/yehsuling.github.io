<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="google-site-verification" content="orgFvipYeWimIrZL8rZdiy0c3JoNLghck_kCQmoDP2s" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房貸試算 | 房貸計算機：手機專用首選 - 精準房貸試算器</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f7fa; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #3182ce; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 25px; padding: 20px; background-color: #ebf8ff; border-left: 5px solid #3182ce; border-radius: 4px; display: none; }
        .result-item { margin: 12px 0; font-size: 16px; line-height: 1.5; }
        .highlight { font-size: 20px; font-weight: bold; color: #e53e3e; }
        .info-section { margin-top: 40px; padding-top: 20px; border-top: 2px solid #e2e8f0; color: #4a5568; line-height: 1.6; }
        .disclaimer { margin-top: 30px; font-size: 12px; color: #a0aec0; border-top: 1px dashed #e2e8f0; padding-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏠 精準房貸試算器</h2>
    <div class="input-group"><label>貸款總額 (萬元)</label><input type="number" id="loanAmountInput" value="1000"></div>
    <div class="input-group"><label>利率類型</label><select id="rateType" onchange="toggleRateFields()"><option value="1">一段式</option><option value="2" selected>二階段式</option></select></div>
    <div class="input-group" id="singleRateGroup" style="display:none;"><label>年利率 (%)</label><input type="number" id="interestRate" step="0.01" value="2.18"></div>
    <div id="stageRateGroup">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>第一階段月數</label><input type="number" id="stage1Months" value="24"></div>
            <div><label>第一階段利率 (%)</label><input type="number" id="stage1Rate" step="0.01" value="1.775"></div>
        </div>
        <div class="input-group"><label>第二階段起利率 (%)</label><input type="number" id="stage2Rate" step="0.01" value="2.25"></div>
    </div>
    <div class="input-group"><label>貸款年限 (年)</label><input type="number" id="loanTerm" value="30"></div>
    <div class="input-group" id="gracePeriodGroup"><label>寬限期 (年)</label><input type="number" id="gracePeriod" value="3" min="0"></div>
    <div class="input-group"><label>銀行手續費 (元)</label><input type="number" id="bankFee" value="5000"></div>
    <div class="input-group"><label>還款方式</label><select id="repayType" onchange="toggleGraceField()"><option value="1">本息平均攤還</option><option value="2">本金平均攤還</option><option value="3">到期還本</option></select></div>
    <button onclick="calculateLoan()">開始精準試算</button>
    <div class="result" id="resultBox">
        <h3>📊 試算結果</h3>
        <div id="paymentDetailBlock"></div>
        <div class="result-item" id="rowFinalPrincipal" style="display:none;">⚠️ 到期需償還本金：<span class="highlight" id="lblFinalPrincipal">0</span> 元</div>
        <div class="result-item">總支付利息：<span id="totalInterest" style="font-weight:bold;">0</span> 元</div>
        <div class="result-item">總還款支出：<span id="totalPayable" style="font-weight:bold; color:#2b6cb0;">0</span> 元</div>
    </div>
    <div class="info-section">
        <h3>💡 2026 購屋族必看：如何選擇適合自己的還款方式？</h3>
        <p><strong>1. 本息平均攤還：</strong>每個月還款金額固定，方便預算規劃。</p>
        <p><strong>2. 本金平均攤還：</strong>前期壓力大，但總利息支出較低。</p>
        <p><strong>3. 到期還本：</strong>適合有頻繁資金周轉需求的族群，平時只繳利息。</p>
        <p><strong>政策提醒：</strong>新青安 3.0 混搭商業房貸時，務必精算補貼結束後的利率變化。</p>
    </div>
    <div class="disclaimer">
        ⚠️ 免責聲明：本站數據僅供參考。📌 最新公告：<a href="https://www.facebook.com/precise.mortgage.calculator" target="_blank">官方粉專</a>。
    </div>
</div>
<script>
function toggleRateFields() { var isStage = document.getElementById('rateType').value === '2'; document.getElementById('singleRateGroup').style.display = isStage ? 'none' : 'block'; document.getElementById('stageRateGroup').style.display = isStage ? 'block' : 'none'; }
function toggleGraceField() { document.getElementById('gracePeriodGroup').style.display = document.getElementById('repayType').value === '3' ? 'none' : 'block'; }
function calculateLoan() {
    var loanAmount = parseFloat(document.getElementById('loanAmountInput').value) * 10000;
    var rateType = document.getElementById('rateType').value;
    var repayType = document.getElementById('repayType').value;
    var totalMonths = parseInt(document.getElementById('loanTerm').value) * 12;
    var graceMonths = (repayType === '3') ? 0 : parseInt(document.getElementById('gracePeriod').value) * 12;
    var s1Months = (rateType === '2') ? parseInt(document.getElementById('stage1Months').value) : 0;
    var r1 = (rateType === '2') ? (parseFloat(document.getElementById('stage1Rate').value)/100)/12 : (parseFloat(document.getElementById('interestRate').value)/100)/12;
    var r2 = (rateType === '2') ? (parseFloat(document.getElementById('stage2Rate').value)/100)/12 : r1;
    var monthlyRates = []; for(var i=0; i<totalMonths; i++) monthlyRates.push(i < s1Months ? r1 : r2);
    
    var detailHTML = "", totalInterest = 0, remainingPrincipal = loanAmount;
    document.getElementById('rowFinalPrincipal').style.display = 'none';

    if (repayType === '1') {
        if (graceMonths > 0) {
            var g1 = 0, g2 = 0;
            for(var i=0; i<graceMonths; i++) {
                var int = remainingPrincipal * monthlyRates[i];
                totalInterest += int;
                if(i < s1Months) g1 += int; else g2 += int;
            }
            if(g1 > 0) detailHTML += `<div>第 1～${Math.min(graceMonths, s1Months)} 個月 (利息)：<span class="highlight">${Math.round(g1/Math.min(graceMonths, s1Months)).toLocaleString()}</span> 元/月</div>`;
            if(g2 > 0) detailHTML += `<div>第 ${s1Months+1}～${graceMonths} 個月 (利息)：<span class="highlight">${Math.round(g2/(graceMonths-s1Months)).toLocaleString()}</span> 元/月</div>`;
        }
        var rFinal = monthlyRates[totalMonths-1];
        var n = totalMonths - graceMonths;
        var monthlyPay = Math.round(remainingPrincipal * (rFinal * Math.pow(1+rFinal, n)) / (Math.pow(1+rFinal, n) - 1));
        detailHTML += `<div style="margin-top:10px;"><strong>第 ${graceMonths+1} 個月起 (全期攤還)：<br><span class="highlight">${monthlyPay.toLocaleString()}</span> 元/月</strong></div>`;
    } else if (repayType === '3') {
        for(var i=0; i<totalMonths; i++) totalInterest += loanAmount * monthlyRates[i];
        detailHTML = `<div>每月應繳 (純利息)：<span class="highlight">${Math.round(totalInterest/totalMonths).toLocaleString()}</span> 元/月</div>`;
        document.getElementById('lblFinalPrincipal').innerText = (loanAmount/10000).toLocaleString();
        document.getElementById('rowFinalPrincipal').style.display = 'block';
    }
    document.getElementById('paymentDetailBlock').innerHTML = detailHTML;
    document.getElementById('totalInterest').innerText = Math.round(totalInterest).toLocaleString();
    document.getElementById('totalPayable').innerText = Math.round(loanAmount + totalInterest + parseFloat(document.getElementById('bankFee').value)).toLocaleString();
    document.getElementById('resultBox').style.display = 'block';
}
</script>
</body>
</html>
